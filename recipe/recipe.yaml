schema_version: 1

context:
  version: "7.2.1001"

package:
  name: murex
  version: ${{ version }}

source:
  url: https://github.com/lmorg/murex/archive/v${{ version }}.tar.gz
  sha256: 264a1b3ffca3fce8d8c1b0757e0498dc544fd5388694c405c6e4e42c6f87a82c

build:
  number: 0
  skip: win

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - murex -v

about:
  license: GPL-2.0-only
  license_file:
    - LICENSE
    - license-files/
  summary: Bash-like shell designed for greater command-line productivity and safer scripts
  homepage: https://murex.rocks
  repository: https://github.com/lmorg/murex

extra:
  recipe-maintainers:
    - danielnachun
